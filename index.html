<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pew pew pew</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; user-select:none; }
  canvas { display:block; cursor:crosshair; touch-action:none; }
  #portrait-warn {
    display:none; position:fixed; inset:0; background:#000;
    color:#4aadff; font:bold 18px monospace;
    flex-direction:column; align-items:center; justify-content:center;
    gap:18px; z-index:999; text-align:center; padding:24px;
  }
  #portrait-warn span { font-size:64px; animation:spin 1.8s linear infinite; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  /* ── Menu de démarrage ────────────────────────────────────────────── */
  #start-menu {
    position:fixed; inset:0; z-index:200;
    display:flex; align-items:center; justify-content:center;
    background:rgba(2,4,18,0.93);
    font-family:monospace;
  }
  #start-menu::before {
    content:''; position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0.13) 0px,rgba(0,0,0,0.13) 1px,transparent 1px,transparent 3px);
    z-index:1;
  }
  .smenu {
    position:relative; z-index:2;
    display:flex; flex-direction:column; align-items:center; gap:18px;
    padding:44px 56px; border-radius:10px;
    border:1px solid rgba(80,180,255,0.18);
    background:rgba(4,10,40,0.82);
    box-shadow:0 0 60px rgba(40,120,255,0.12), inset 0 0 40px rgba(10,20,80,0.4);
    min-width:320px;
  }
  .smenu-title {
    font-size:clamp(28px,5vw,52px); font-weight:900; letter-spacing:0.18em;
    color:#ffe060; text-shadow:0 0 18px #ffaa00, 0 0 40px #ff8800;
    animation:titlepulse 2.4s ease-in-out infinite;
  }
  @keyframes titlepulse {
    0%,100%{text-shadow:0 0 18px #ffaa00,0 0 40px #ff8800;}
    50%{text-shadow:0 0 30px #ffcc00,0 0 70px #ffaa00,0 0 100px #ff6600;}
  }
  .smenu-sub {
    font-size:11px; letter-spacing:0.35em; color:rgba(100,160,255,0.6);
    text-transform:uppercase; margin-top:-12px;
  }
  .smenu-hi {
    font-size:12px; color:rgba(180,160,255,0.55); letter-spacing:0.1em;
  }
  .smenu-hi span { color:rgba(210,190,255,0.85); }
  .smenu-sep {
    width:100%; height:1px;
    background:linear-gradient(90deg,transparent,rgba(80,160,255,0.25),transparent);
  }
  .smenu-label {
    font-size:10px; letter-spacing:0.3em; color:rgba(80,160,255,0.6);
    text-transform:uppercase; align-self:flex-start;
  }
  #menu-name {
    width:100%; padding:10px 14px;
    background:rgba(0,10,40,0.8); border:1px solid rgba(80,160,255,0.35);
    border-radius:5px; color:#4adfff; font:bold 22px monospace;
    text-align:center; letter-spacing:0.2em; text-transform:uppercase;
    outline:none; caret-color:#4adfff;
    transition:border-color .2s, box-shadow .2s;
  }
  #menu-name:focus {
    border-color:rgba(80,200,255,0.7);
    box-shadow:0 0 12px rgba(60,160,255,0.3);
  }
  #menu-start {
    margin-top:4px; padding:12px 36px;
    background:linear-gradient(135deg,rgba(20,60,180,0.9),rgba(10,30,100,0.9));
    border:1px solid rgba(80,160,255,0.45); border-radius:6px;
    color:#4adfff; font:bold 15px monospace; letter-spacing:0.15em;
    cursor:pointer; text-transform:uppercase;
    transition:all .15s; box-shadow:0 0 16px rgba(40,120,255,0.2);
  }
  #menu-start:hover {
    background:linear-gradient(135deg,rgba(40,100,255,0.9),rgba(20,60,180,0.9));
    box-shadow:0 0 28px rgba(60,160,255,0.45);
    color:#fff;
  }
  #menu-start:active { transform:scale(0.97); }
  .smenu-controls {
    font-size:9px; letter-spacing:0.2em; color:rgba(80,100,160,0.55);
    text-transform:uppercase; text-align:center; line-height:1.8;
  }
  .smenu-blink { animation:blink 1.1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>
<div id="portrait-warn"><span>↻</span><p>Tournez votre appareil<br>en mode paysage</p></div>
<div id="start-menu">
  <div class="smenu">
    <div class="smenu-title">PEW PEW PEW</div>
    <div class="smenu-sub">Space Combat Simulator</div>
    <div class="smenu-hi">HI-SCORE &nbsp;<span id="menu-hi-val">000000</span></div>
    <div class="smenu-sep"></div>
    <div class="smenu-label">Nom du u</div>
    <input id="menu-name" type="text" maxlength="10" value="ACE" spellcheck="false" autocomplete="off">
    <button id="menu-start">▶ &nbsp;Lancer la partie</button>
    <div class="smenu-controls">
      Clic gauche ← rotation &nbsp;|&nbsp; clic droit → rotation<br>
      Les deux clics → propulsion directe
    </div>
    <div class="smenu-blink" style="font-size:10px;color:rgba(80,160,255,0.5);letter-spacing:0.3em;">— APPUYEZ SUR ENTRÉE —</div>
  </div>
</div>
<div id="fs-btn" style="display:none;position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(10,20,60,0.85);color:#4aadff;font:bold 14px monospace;border:1px solid #4aadff44;border-radius:8px;padding:8px 22px;pointer-events:auto;">⛶ Plein écran</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ── Audio (Web Audio API) ─────────────────────────────────────────────────
const _ac=(()=>{try{return new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}})();
function _resumeAC(){ if(_ac&&_ac.state==='suspended') _ac.resume(); }
canvas.addEventListener('mousedown',_resumeAC,{once:false});
canvas.addEventListener('touchstart',_resumeAC,{once:false,passive:true});
function playSound(type,vol=0.4){
  if(!_ac) return;
  const t=_ac.currentTime;
  const g=_ac.createGain(); g.connect(_ac.destination);
  const o=_ac.createOscillator();
  o.connect(g);
  if(type==='shoot'){
    // Tir : bref pfiu
    o.type='sawtooth'; o.frequency.setValueAtTime(820,t); o.frequency.exponentialRampToValueAtTime(180,t+0.08);
    g.gain.setValueAtTime(vol*0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.09);
    o.start(t); o.stop(t+0.09);
  } else if(type==='explode'){
    // Explosion : bruit filtré
    const buf=_ac.createBuffer(1,_ac.sampleRate*0.35,_ac.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
    const src=_ac.createBufferSource(); src.buffer=buf;
    const f=_ac.createBiquadFilter(); f.type='bandpass'; f.frequency.value=280; f.Q.value=0.6;
    src.connect(f); f.connect(g);
    g.gain.setValueAtTime(vol*0.9,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    src.start(t); src.stop(t+0.35);
    o.disconnect(); o.start(t); o.stop(t); // dummy
    return;
  } else if(type==='shield'){
    // Bouclier touché : clac métallique
    o.type='square'; o.frequency.setValueAtTime(440,t); o.frequency.exponentialRampToValueAtTime(110,t+0.12);
    g.gain.setValueAtTime(vol*0.25,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.13);
    o.start(t); o.stop(t+0.13);
  } else if(type==='capture'){
    // Capture spawn : bip montant
    o.type='sine'; o.frequency.setValueAtTime(440,t); o.frequency.exponentialRampToValueAtTime(880,t+0.22);
    g.gain.setValueAtTime(vol*0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
    o.start(t); o.stop(t+0.25);
  } else if(type==='respawn'){
    // Respawn joueur : accord montant
    [440,550,660].forEach((f,i)=>{
      const oo=_ac.createOscillator(), gg=_ac.createGain();
      oo.connect(gg); gg.connect(_ac.destination);
      oo.type='sine'; oo.frequency.value=f;
      const tt=t+i*0.08;
      gg.gain.setValueAtTime(0.001,tt); gg.gain.linearRampToValueAtTime(vol*0.4,tt+0.05);
      gg.gain.exponentialRampToValueAtTime(0.001,tt+0.22);
      oo.start(tt); oo.stop(tt+0.22);
    });
    o.disconnect(); o.start(t); o.stop(t); return;
  }
}
// ── Son spatial : atténuation par distance ───────────────────────────────
function playSound(type,vol=0.4,wx,wy){
  if(!_ac) return;
  // Atténuation distance (si position fournie)
  if(wx!==undefined){
    const d=Math.hypot(wx-ship.x,wy-ship.y);
    const maxD=950;
    if(d>maxD) return;
    const att=(1-d/maxD); vol*=att*att; // décroissance quadratique
  }
  if(vol<0.015) return;
  const t=_ac.currentTime;
  const g=_ac.createGain(); g.connect(_ac.destination);
  const o=_ac.createOscillator(); o.connect(g);
  if(type==='shoot'){
    o.type='sawtooth'; o.frequency.setValueAtTime(820,t); o.frequency.exponentialRampToValueAtTime(180,t+0.08);
    g.gain.setValueAtTime(vol*0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.09);
    o.start(t); o.stop(t+0.09);
  } else if(type==='explode'){
    const buf=_ac.createBuffer(1,_ac.sampleRate*0.35,_ac.sampleRate);
    const d2=buf.getChannelData(0); for(let i=0;i<d2.length;i++) d2[i]=(Math.random()*2-1);
    const src=_ac.createBufferSource(); src.buffer=buf;
    const f=_ac.createBiquadFilter(); f.type='bandpass'; f.frequency.value=280; f.Q.value=0.6;
    src.connect(f); f.connect(g);
    g.gain.setValueAtTime(vol*0.9,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    src.start(t); src.stop(t+0.35);
    o.disconnect(); o.start(t); o.stop(t); return;
  } else if(type==='shield'){
    o.type='square'; o.frequency.setValueAtTime(440,t); o.frequency.exponentialRampToValueAtTime(110,t+0.12);
    g.gain.setValueAtTime(vol*0.25,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.13);
    o.start(t); o.stop(t+0.13);
  } else if(type==='capture'){
    o.type='sine'; o.frequency.setValueAtTime(440,t); o.frequency.exponentialRampToValueAtTime(880,t+0.22);
    g.gain.setValueAtTime(vol*0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
    o.start(t); o.stop(t+0.25);
  } else if(type==='respawn'){
    [440,550,660].forEach((f2,i)=>{
      const oo=_ac.createOscillator(), gg=_ac.createGain();
      oo.connect(gg); gg.connect(_ac.destination);
      oo.type='sine'; oo.frequency.value=f2;
      const tt=t+i*0.08;
      gg.gain.setValueAtTime(0.001,tt); gg.gain.linearRampToValueAtTime(vol*0.4,tt+0.05);
      gg.gain.exponentialRampToValueAtTime(0.001,tt+0.22);
      oo.start(tt); oo.stop(tt+0.22);
    });
    o.disconnect(); o.start(t); o.stop(t); return;
  }
}

// ── Réacteur joueur (son continu) ────────────────────────────────────────
let _engOsc=null, _engGain=null;
function initEngine(){
  if(!_ac||_engOsc) return;
  _engOsc=_ac.createOscillator(); _engOsc.type='sawtooth';
  const filt=_ac.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=320;
  _engGain=_ac.createGain(); _engGain.gain.value=0;
  _engOsc.connect(filt); filt.connect(_engGain); _engGain.connect(_ac.destination);
  _engOsc.start();
}
function updateEngineSound(){
  if(!_ac||ship.dead){ if(_engGain) _engGain.gain.setTargetAtTime(0,_ac.currentTime,0.1); return; }
  initEngine();
  const spd=Math.hypot(ship.vx,ship.vy)/MAX_SPEED;
  const thrust=keys.left||keys.right;
  const targetGain=thrust?0.025+spd*0.015:spd*0.008;
  _engGain.gain.setTargetAtTime(targetGain,_ac.currentTime,0.12);
  _engOsc.frequency.setTargetAtTime(52+spd*70,_ac.currentTime,0.08);
}

// ── Doppler bots (effet Star Wars) ───────────────────────────────────────
let _dopplerClock=0;
function updateDoppler(){
  if(!_ac) return;
  if(++_dopplerClock%6!==0) return; // vérif toutes les 6 frames
  const all=[...blues,...reds].filter(a=>!a.dead);
  let best=null, bestScore=-1;
  for(const ai of all){
    const dx=ai.x-ship.x, dy=ai.y-ship.y;
    const dist=Math.hypot(dx,dy);
    if(dist>520||dist<20) continue;
    const spd=Math.hypot(ai.vx,ai.vy);
    if(spd<0.5) continue;
    const score=spd*(1-dist/520);
    if(score>bestScore){bestScore=score;best={ai,dx,dy,dist,spd};}
  }
  if(!best||bestScore<0.01) return;
  const {ai,dx,dy,dist,spd}=best;
  // Vitesse radiale : positif = s'éloigne, négatif = approche
  const radVel=(ai.vx*dx+ai.vy*dy)/dist;
  const dopplerShift=1-radVel/12; // approche → aigu, fuite → grave
  const baseFreq=90;
  const freq=Math.max(35,Math.min(320,baseFreq*dopplerShift));
  const vol=0.06*(1-dist/520)*Math.min(1,spd/2.5);
  if(vol<0.008) return;
  const t=_ac.currentTime;
  const o=_ac.createOscillator(), g=_ac.createGain();
  const f=_ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=500;
  o.connect(f); f.connect(g); g.connect(_ac.destination);
  o.type='sawtooth';
  o.frequency.setValueAtTime(freq*(radVel<0?1.25:0.85),t);
  o.frequency.exponentialRampToValueAtTime(freq*(radVel<0?0.78:1.18),t+0.28);
  g.gain.setValueAtTime(0.001,t);
  g.gain.linearRampToValueAtTime(vol,t+0.04);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
  o.start(t); o.stop(t+0.3);
}

let _shootThrottle=0;
function sfxShoot(wx,wy){ if(++_shootThrottle%4===0) playSound('shoot',0.22,wx,wy); }
let _astSfxThrottle=0; // anti-saturation sonore des impacts d'astéroïdes
let _deathFxTimer=0;  // effet dramatique post-mort joueur

// ── Constantes ────────────────────────────────────────────────────────────
const GRID           = 60;
let THRUST_FWD     = 0.14;
const THRUST_ANG     = 0.007;
const DAMPING_LIN    = 0.978;
const DAMPING_ANG    = 0.78;
let MAX_SPEED      = 5;
const SHIP_RADIUS    = 14;
const MAP_HALF       = 7200;
const MAP_RADIUS     = 8500; // rayon de la map circulaire
let BULLET_SPEED   = 5.5;
const BULLET_LIFE    = 130;
const MAX_BULLETS    = 350; // plafond dur pour les perfs
const FIRE_RANGE     = 580;
const BURST_SIZE     = 2;
const BURST_DELAY    = 9;
const BURST_CD       = 38;
const RESPAWN_FRAMES = 600;
const AI_HP          = 3;
const RED_AI_HP      = 2; // Rouges deux fois moins résistants
const PLAYER_HP      = 6;
const ENGAGE_DIST    = 220;
const TEAM_LIVES     = 500;
const SPAWN_RADIUS   = 140;
const CAPTURE_FRAMES = 300;
const SHIELD_MAX     = 8;
const RED_SHIELD_MAX = 2; // Bouclier rouge très fragile
const SPAWN_IMMUNE   = 180; // 3 secondes à 60fps
const SHIELD_REGEN   = 150;
const RADAR_RANGE    = 2200;

// ── Planète centrale ──────────────────────────────────────────────────────
const PLANET = {x:0, y:0, r:300, gravR:1400, G:0.055};

// ── Nébuleuses ────────────────────────────────────────────────────────────
const NEBULAE=[
  {x:-4200,y:-1300,r:920,c:[80,50,220]},
  {x: 4000,y:-1000,r:800,c:[50,175,80]},
  {x:-2800,y: 2400,r:760,c:[200,75,50]},
  {x: 3600,y: 2000,r:700,c:[55,150,210]},
];
function nebulaFactor(wx,wy){let f=1;for(const n of NEBULAE){if(Math.hypot(wx-n.x,wy-n.y)<n.r)f=Math.min(f,0.30);}return f;}

// ── Zones EMP ────────────────────────────────────────────────────────────
const EMP_ZONES=[
  {x:-5500,y: 800,r:520,period:500,t:0},
  {x: 5500,y:-800,r:520,period:540,t:255},
];
const EMP_PULSE_DUR=80;

// ── Pluie de météores ─────────────────────────────────────────────────────
let meteorTimer=1000+Math.floor(Math.random()*600);
const meteors=[];
let meteorDir=1, meteorWarn=0, meteorNotif=0;

// ── Balise de signal ──────────────────────────────────────────────────────
const BEACON={x:0,y:-2200,r:55,capTeam:null,progress:0,revealTimer:0,revealTeam:null,resetTimer:0};
const BEACON_CAP=360;

// ── Épave avec loot rare ──────────────────────────────────────────────────
let wreckLoot=null, wreckSpawnTimer=1400;
const WRECK_SPAWN={x:0,y:700};

// ── Joueur ────────────────────────────────────────────────────────────────
const ship = {
  x:0, y:0, vx:0, vy:0, angle:-Math.PI/2, angVel:0, hit:0,
  team:'blue', hp:PLAYER_HP,
  shield:SHIELD_MAX, shieldTimer:0, shieldHit:0,
  burstLeft:0, burstTimer:0, fireTimer:0, burstTarget:null,
  dead:false, respawnTimer:0, immuneTimer:0,
  name:'JOUEUR', empTimer:0, speedBoost:0,
};
const keys = { left:false, right:false };
// ── Caméra & mode spectateur ──────────────────────────────────────────────
let _camX=0, _camY=0;
let spectMode=false, spectIdx=0, _spectTarget=null, spectAutoDeath=false;
canvas.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('keydown', e=>{
  if(e.key==='v'||e.key==='V'){
    spectMode=!spectMode; spectIdx=0; spectAutoDeath=false;
  }
  if(spectMode&&(e.key==='ArrowRight'||e.key==='e'||e.key==='E'||e.key==='d'||e.key==='D')) spectIdx++;
  if(spectMode&&(e.key==='ArrowLeft' ||e.key==='q'||e.key==='Q'||e.key==='a'||e.key==='A')) spectIdx--;
});
canvas.addEventListener('mousedown',   e => { if(e.button===0)keys.left=true;  if(e.button===2)keys.right=true; });
window .addEventListener('mouseup',    e => { if(e.button===0)keys.left=false; if(e.button===2)keys.right=false; });
// Détection mobile
const isMobile = navigator.maxTouchPoints > 0;
if(isMobile){ THRUST_FWD*=0.55; MAX_SPEED*=0.55; BULLET_SPEED*=0.6; }
// Contrôles tactiles
function evalTouches(touches){ keys.left=false; keys.right=false; for(const t of touches){ if(t.clientX<window.innerWidth/2)keys.left=true; else keys.right=true; } }
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  if(spectMode){
    // En mode spectateur : tap gauche = u précédent, tap droit = suivant
    for(const t of e.changedTouches){
      if(t.clientX<window.innerWidth/2) spectIdx--; else spectIdx++;
    }
    return;
  }
  evalTouches(e.touches);
},{passive:false});
canvas.addEventListener('touchend',    e=>{ e.preventDefault(); if(!spectMode) evalTouches(e.touches); },{passive:false});
canvas.addEventListener('touchcancel', e=>{ e.preventDefault(); if(!spectMode) evalTouches(e.touches); },{passive:false});
// Orientation paysage
const _warn=document.getElementById('portrait-warn');
function isPortrait(){ return window.screen.height>window.screen.width||window.innerHeight>window.innerWidth; }
function checkOrientation(){
  const p=isPortrait();
  _warn.style.display=(isMobile&&p)?'flex':'none';
  if(!p) resizeCanvas();
}
checkOrientation();
window.addEventListener('resize', checkOrientation);
window.addEventListener('orientationchange', ()=>setTimeout(checkOrientation,200));
if(screen.orientation&&screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
// Bouton plein écran (mobile)
const _fsBtn=document.getElementById('fs-btn');
function enterFS(){
  const el=document.documentElement;
  const req=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen;
  if(req) req.call(el).then(()=>{_fsBtn.style.display='none';setTimeout(checkOrientation,300);}).catch(()=>{});
}
if(isMobile){ _fsBtn.style.display='block'; _fsBtn.addEventListener('click',enterFS); }
document.addEventListener('fullscreenchange',()=>{ if(!document.fullscreenElement&&isMobile) _fsBtn.style.display='block'; });
// Plein écran automatique au premier touch sur mobile (nécessite un geste utilisateur)
if(isMobile){
  document.addEventListener('touchstart', function _autoFS(){
    document.removeEventListener('touchstart',_autoFS);
    if(!document.fullscreenElement) enterFS();
  },{once:true,passive:true});
}

// ── Étoiles ───────────────────────────────────────────────────────────────
const STARS = Array.from({length:200}, ()=>({
  x:Math.random()*3200-1600, y:Math.random()*3200-1600,
  r:Math.random()*1.5+0.2, alpha:Math.random()*0.7+0.2, p:Math.random()*0.28+0.04,
}));

// ── Astéroïdes ────────────────────────────────────────────────────────────
let _aId=0;
function makeAsteroid(wx,wy){
  const radius=24+Math.random()*58, pts=7+Math.floor(Math.random()*6), verts=[];
  const rot=(Math.random())*Math.PI*2, rotVel=(Math.random()-0.5)*0.008;
  for(let j=0;j<pts;j++){
    const a=(j/pts)*Math.PI*2+(Math.random()-0.5)*0.38, r=radius*(0.86+Math.random()*0.18);
    verts.push([Math.cos(a)*r, Math.sin(a)*r]);
  }
  const vx=(Math.random()-0.5)*0.35, vy=(Math.random()-0.5)*0.35;

// Cap de vitesse en fonction de la masse (r²) — les gros bougent peu
function aSpeedCap(r){ return Math.max(0.7, 4.5/(r*0.032+0.55)); }

function updateAsteroids(){
  const B=MAP_HALF;
  for(let i=ASTEROIDS.length-1;i>=0;i--){
    const a=ASTEROIDS[i];
    a.wx+=a.vx; a.wy+=a.vy;
    a.rot+=a.rotVel; a.rotVel*=0.999;
    a.vx*=0.999; a.vy*=0.999;
    // Destruction au contact de la planète
    if(Math.hypot(a.wx-PLANET.x,a.wy-PLANET.y)<PLANET.r+a.radius){
      addSpark(a.wx,a.wy,'blue'); ASTEROIDS.splice(i,1); continue;
    }
    const ad=Math.hypot(a.wx,a.wy)||0.01;
    if(ad>B-a.radius){
      const anx=a.wx/ad, any=a.wy/ad;
      a.wx=anx*(B-a.radius); a.wy=any*(B-a.radius);
      const adot=a.vx*anx+a.vy*any;
      if(adot>0){a.vx-=2*adot*anx*0.6;a.vy-=2*adot*any*0.6;}
    }
    // ── Collision astéroïde–astéroïde avec masse ─────────────────────────
    for(const b of nearA(a.wx,a.wy)){
      if(b.id<=a.id) continue; // chaque paire une seule fois
      const cdx=a.wx-b.wx, cdy=a.wy-b.wy, cdist=Math.hypot(cdx,cdy)||0.01;
      if(cdist>=(a.radius+b.radius)*0.72) continue;
      const cnx=cdx/cdist, cny=cdy/cdist; // normale de b vers a
      const vRelN=(a.vx-b.vx)*cnx+(a.vy-b.vy)*cny; // <0 = approche
      if(vRelN>=-0.04) continue; // seuil minimal — ignore micro-contacts statiques
      const mA=a.radius*a.radius, mB=b.radius*b.radius, mT=mA+mB;
      // e=0.82 : quasi-élastique → l'impacteur rebondit, pas de "même direction"
      const e=0.82;
      const dvA=-(1+e)*mB/mT*vRelN; // >0 : pousse a dans +n (recul)
      const dvB= (1+e)*mA/mT*vRelN; // <0 : pousse b dans -n (éjecté)
      a.vx+=dvA*cnx; a.vy+=dvA*cny;
      b.vx+=dvB*cnx; b.vy+=dvB*cny;
      // Cap vitesse selon masse
      const capA=aSpeedCap(a.radius), capB=aSpeedCap(b.radius);
      const sA=Math.hypot(a.vx,a.vy); if(sA>capA){a.vx=a.vx/sA*capA;a.vy=a.vy/sA*capA;}
      const sB=Math.hypot(b.vx,b.vy); if(sB>capB){b.vx=b.vx/sB*capB;b.vy=b.vy/sB*capB;}
      // Séparation complète de l'overlap (évite imbrication persistante)
      const ov=((a.radius+b.radius)*0.72-cdist+0.2);
      a.wx+=cnx*ov*mB/mT; a.wy+=cny*ov*mB/mT;
      b.wx-=cnx*ov*mA/mT; b.wy-=cny*ov*mA/mT;
      // Rotation tangentielle au choc
      const tang=(a.vy-b.vy)*cnx-(a.vx-b.vx)*cny;
      a.rotVel+=tang*0.0008/(a.radius*0.04+0.5);
      b.rotVel-=tang*0.0008/(b.radius*0.04+0.5);
    }
  }
  rebuildAGrid();
}

// ── Physique ──────────────────────────────────────────────────────────────
function applyPhysics(obj,simL,simR){
  const boost=obj.speedBoost>0?1.45:1;
  const thrust=THRUST_FWD*boost, maxSpd=MAX_SPEED*boost;
  const fwd=Math.cos(obj.angle), fup=Math.sin(obj.angle);
  // ── Zones EMP : coupure continue + répulsion magnétique ──────────────────
  let empBlocked=false;
  for(const ez of EMP_ZONES){
    const d=Math.hypot(obj.x-ez.x,obj.y-ez.y)||0.01;
    if(d<ez.r){
      empBlocked=true;
      // Poussée magnétique douce vers l'extérieur
      obj.vx+=(obj.x-ez.x)/d*0.025;
      obj.vy+=(obj.y-ez.y)/d*0.025;
    }
  }
  obj.empTimer=empBlocked?1:0; // pour le HUD uniquement
  if(!empBlocked){
    if(simL&&simR){obj.vx+=fwd*thrust; obj.vy+=fup*thrust;}
    else if(simL){obj.angVel+=THRUST_ANG; obj.vx+=fwd*thrust*0.35; obj.vy+=fup*thrust*0.35;}
    else if(simR){obj.angVel-=THRUST_ANG; obj.vx+=fwd*thrust*0.35; obj.vy+=fup*thrust*0.35;}
  }
  const spd=Math.hypot(obj.vx,obj.vy);
  if(spd>maxSpd){obj.vx=obj.vx/spd*maxSpd; obj.vy=obj.vy/spd*maxSpd;}
  if(obj.speedBoost>0) obj.speedBoost--;
  obj.angVel*=DAMPING_ANG; obj.vx*=DAMPING_LIN; obj.vy*=DAMPING_LIN;
  obj.angle+=obj.angVel; obj.x+=obj.vx; obj.y+=obj.vy;
}
function asteroidBounce(obj,nearby){
  for(const a of nearby){
    const dx=obj.x-a.wx, dy=obj.y-a.wy, dist=Math.hypot(dx,dy);
    const minD=SHIP_RADIUS+a.radius*0.72;
    if(dist<minD&&dist>0.1){
      const nx=dx/dist, ny=dy/dist;
      obj.x+=nx*(minD-dist); obj.y+=ny*(minD-dist);
      // Vitesse relative le long de la normale
      const relV=(obj.vx-a.vx)*nx+(obj.vy-a.vy)*ny;
      if(relV<0){
        // Rebond vaisseau
        obj.vx-=1.45*relV*nx; obj.vy-=1.45*relV*ny;
        obj.angVel+=(Math.random()-0.5)*0.06;
        obj.hit=8;
        // ── Dégâts de collision (proportionnels à la vitesse d'impact) ──
        // relV est négatif : plus il est fort, plus l'impact est frontal et rapide
        const impact=Math.abs(relV);
        if(impact>1.6&&!obj.dead&&obj.immuneTimer===0){
          // 1 dégât si impact modéré (>1.6), 2 si fort (>3.0), 3 si très fort (>5.0)
          const dmg=impact>5.0?3:impact>3.0?2:1;
          addSpark(obj.x,obj.y, obj.team||'blue');
          playSound('shield',0.2,obj.x,obj.y);
          let remaining=dmg;
          while(remaining>0){
            if(!takeHit(obj)){obj.hp-=1;}
            remaining--;
          }
          if(obj.hp<=0&&!obj.dead){
            obj.dead=true; obj.respawnTimer=RESPAWN_FRAMES;
            addExplosion(obj.x,obj.y,obj.team);
            teamLives[obj.team]--; dropPickup(obj.x,obj.y);
            playSound('explode',0.55,obj.x,obj.y);
            if(obj===ship) addLog([{text:'JOUEUR',col:teamCol('blue')},{text:' écrasé sur un astéroïde',col:'#888'}]);
            else addLog([{text:obj.name,col:teamCol(obj.team)},{text:' écrasé sur un astéroïde',col:'#888'}]);
          }
        }
        // Impulsion sur l'astéroïde (masse ∝ r² — les gros bougent moins)
        const push=Math.abs(relV)*2.5/(a.radius*0.035+0.6);
        a.vx-=nx*push; a.vy-=ny*push;
        const aSpd=Math.hypot(a.vx,a.vy), aCap=aSpeedCap(a.radius);
        if(aSpd>aCap){a.vx=a.vx/aSpd*aCap;a.vy=a.vy/aSpd*aCap;}
        // Rotation due au choc (tangente de l'impact)
        a.rotVel+=(-ny*(obj.vx-a.vx)+nx*(obj.vy-a.vy))*0.0018/(a.radius*0.04+0.5);
        const maxRot=0.12; if(Math.abs(a.rotVel)>maxRot) a.rotVel=Math.sign(a.rotVel)*maxRot;
      }
    }
  }
}
function wallBounce(obj){
  const dist=Math.hypot(obj.x,obj.y)||0.01;
  const R=MAP_RADIUS-SHIP_RADIUS;
  if(dist>=R){
    // Rebond dur sur la frontière circulaire
    const nx=obj.x/dist, ny=obj.y/dist;
    obj.x=nx*R; obj.y=ny*R;
    const dot=obj.vx*nx+obj.vy*ny;
    if(dot>0){ obj.vx-=2*dot*nx*0.5; obj.vy-=2*dot*ny*0.5; }
    obj.angVel+=(Math.random()-0.5)*0.08;
  } else if(dist>R-1200){
    // Répulsion douce dans la zone d'avertissement (1200u avant le bord)
    const t=(dist-(R-1200))/1200;
    const nx=obj.x/dist, ny=obj.y/dist;
    obj.vx-=nx*t*0.07;
    obj.vy-=ny*t*0.07;
  }
}

// ── Bouclier ──────────────────────────────────────────────────────────────
function tickShield(obj){
  if(obj.immuneTimer>0) obj.immuneTimer--;
  if(obj.shieldHit>0) obj.shieldHit--;
  if(obj.shieldTimer>0){
    const sMax=obj.maxShield||SHIELD_MAX;
    if(--obj.shieldTimer===0 && obj.shield<sMax){
      obj.shield++;
      if(obj.shield<sMax) obj.shieldTimer=SHIELD_REGEN;
    }
  }
}
function takeHit(obj){
  if(obj.immuneTimer>0) return true; // immunité spawn
  if(obj.shield>0){
    obj.shield--; obj.shieldHit=22; if(obj===ship) playSound('shield',0.35);
    if(obj.shieldTimer===0) obj.shieldTimer=SHIELD_REGEN;
    return true;
  }
  return false;
}

function updateCaptures(){
  for(const sp of spawns){
    const atk = sp.team==='red' ? [...blues,ship] : reds;

    const atkN=atk.filter(a=>!a.dead&&Math.hypot(a.x-sp.x,a.y-sp.y)<SPAWN_RADIUS).length;
    const defN=def.filter(a=>!a.dead&&Math.hypot(a.x-sp.x,a.y-sp.y)<SPAWN_RADIUS).length;
    sp.capTeam=atkN>0?(sp.team==='red'?'blue':'red'):null;
    if(atkN>0&&defN===0){
      // Les rouges capturent plus lentement (0.35×)
      const capRate = sp.capTeam==='red' ? atkN*0.35 : atkN;
      sp.progress+=capRate;
      if(sp.progress>=CAPTURE_FRAMES){
        const newTeam=sp.team==='red'?'blue':'red';
        // Trouver le capteur le plus proche
        const cappers=(newTeam==='blue'?[...blues,ship]:reds).filter(a=>!a.dead&&Math.hypot(a.x-sp.x,a.y-sp.y)<SPAWN_RADIUS);
        const capper=cappers.length?cappers[0]:null;
        const capName=capper?(capper===ship?'JOUEUR':capper.name):'?';
        const capTeam=capper?(capper===ship?'blue':capper.team):'blue';
        addLog([{text:capName,col:teamCol(capTeam)},{text:' ⬡ spawn ',col:'#888'},{text:newTeam==='blue'?'bleu':'rouge',col:teamCol(newTeam)}]);
        sp.team=newTeam;sp.progress=0;sp.capTeam=null; playSound('capture',0.55);
        if(capper===ship){ _score+=200; _caps++; }
      }
    } else if(defN>0&&atkN===0&&sp.progress>0){
      sp.progress=Math.max(0,sp.progress-0.5);
    }
  }
}

function updateAI(ai,enemies){

      ai.shield=ai.maxShield||SHIELD_MAX; ai.shieldTimer=0; ai.shieldHit=0; ai.immuneTimer=SPAWN_IMMUNE;
